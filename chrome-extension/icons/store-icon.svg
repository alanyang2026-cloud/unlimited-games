<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Vivid purple-to-magenta gradient — pops on the white store background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Warm yellow for the U — high contrast on purple -->
    <linearGradient id="u" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Drop shadow under the U so it lifts off the background -->
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App tile background with rounded corners -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.45"/>

  <!-- The "U" mark, big and centered -->
  <g filter="url(#lift)">
    <path d="M 36 38
             L 36 70
             C 36 86 48 95 64 95
             C 80 95 92 86 92 70
             L 92 38"
          fill="none"
          stroke="url(#u)"
          stroke-width="13"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Small star spark top-right (game / play feel) -->
  <g transform="translate(98 30)" fill="#fef3c7">
    <path d="M 0 -7 L 2 -2 L 7 0 L 2 2 L 0 7 L -2 2 L -7 0 L -2 -2 Z"/>
  </g>
  <g transform="translate(30 98)" fill="#fef3c7" opacity="0.8">
    <path d="M 0 -5 L 1.5 -1.5 L 5 0 L 1.5 1.5 L 0 5 L -1.5 1.5 L -5 0 L -1.5 -1.5 Z"/>
  </g>
</svg>
