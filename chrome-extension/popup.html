<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Unlimited Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    width:380px;
    background:#07070d;
    color:#fff;
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
    user-select:none;
  }
  body{
    padding:14px;
    background:
      radial-gradient(circle at 30% 0%, rgba(168,85,247,.35), transparent 60%),
      radial-gradient(circle at 100% 100%, rgba(236,72,153,.25), transparent 50%),
      #07070d;
  }
  .hdr{text-align:center;margin-bottom:10px}
  .hdr h1{
    font-size:20px;
    font-weight:900;
    letter-spacing:1.5px;
    background:linear-gradient(90deg,#fef3c7,#fbbf24);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
    display:inline-block;
  }
  .hdr h1 .g{
    background:linear-gradient(90deg,#c4b5fd,#a855f7);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
  }
  .hdr .sub{
    font-size:9.5px;
    letter-spacing:3px;
    color:#94a3b8;
    margin-top:2px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:7px;
    margin-top:10px;
  }
  .card{
    position:relative;
    aspect-ratio:1/1;
    border-radius:10px;
    cursor:pointer;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.06);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 6px 14px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.18);
    z-index:2;
  }
  .card:active{transform:translateY(-1px) scale(1.02)}
  .card .bg{
    position:absolute;inset:0;
    background:linear-gradient(160deg,var(--c1),var(--c2));
    opacity:.92;
  }
  .card:hover .bg{opacity:1}
  .card .inner{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:6px 4px;
    text-align:center;
  }
  .card .emoji{
    font-size:26px;
    line-height:1;
    margin-bottom:4px;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));
  }
  .card .name{
    font-size:9.5px;
    font-weight:800;
    letter-spacing:.5px;
    color:#fff;
    line-height:1.1;
    text-shadow:0 1px 2px rgba(0,0,0,.7);
  }
  .card.live::after{
    content:"LIVE";
    position:absolute;top:4px;right:4px;
    background:#ec4899;color:#fff;
    font-size:7px;font-weight:900;letter-spacing:.5px;
    padding:1.5px 4px;border-radius:3px;
    box-shadow:0 0 6px rgba(236,72,153,.6);
  }

  .ftr{
    margin-top:12px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,.07);
    padding-top:10px;
  }
  .ftr a{
    display:inline-block;
    color:#c4b5fd;
    font-size:11px;
    text-decoration:none;
    padding:5px 12px;
    border-radius:6px;
    transition:background .15s;
  }
  .ftr a:hover{background:rgba(168,85,247,.15);color:#fff}
  .ftr .sep{color:#374151;margin:0 4px}
</style>
</head>
<body>
  <div class="hdr">
    <h1>🎮 Unlimited <span class="g">Games</span></h1>
    <div class="sub">PICK · CLICK · PLAY</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="ftr">
    <a href="#" data-action="full">🌐 Full site</a>
    <span class="sep">·</span>
    <a href="#" data-action="privacy">Privacy</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
