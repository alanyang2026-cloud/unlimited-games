<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%"  stop-color="#a855f7" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="u" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8b4fe"/>
    </linearGradient>
    <filter id="lift"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope=".55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background (no rounded corners — Chrome Store wants flat fill) -->
  <rect width="440" height="280" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#glow)"/>

  <!-- Stars in background -->
  <g fill="#fde047" opacity=".7">
    <circle cx="40"  cy="42"  r="1.5"/>
    <circle cx="395" cy="60"  r="2"/>
    <circle cx="60"  cy="220" r="1.5"/>
    <circle cx="410" cy="240" r="2.5"/>
    <circle cx="380" cy="200" r="1"/>
    <circle cx="30"  cy="160" r="1"/>
  </g>

  <!-- Big U mark -->
  <g filter="url(#lift)">
    <path d="M 158 70
             L 158 138
             C 158 168 184 187 220 187
             C 256 187 282 168 282 138
             L 282 70"
          fill="none" stroke="url(#u)" stroke-width="24"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sparkles around U -->
  <g fill="#fef3c7">
    <path d="M 290 70 l 3 8 l 8 3 l -8 3 l -3 8 l -3 -8 l -8 -3 l 8 -3 z"/>
    <path d="M 150 195 l 2 5 l 5 2 l -5 2 l -2 5 l -2 -5 l -5 -2 l 5 -2 z" opacity=".85"/>
  </g>

  <!-- Title -->
  <text x="220" y="232" font-family="Impact, 'Arial Black', sans-serif"
        font-size="36" font-weight="900" letter-spacing="2"
        text-anchor="middle" fill="url(#title)">UNLIMITED GAMES</text>
  <!-- Tagline -->
  <text x="220" y="260" font-family="Georgia, serif"
        font-size="13" letter-spacing="3" text-anchor="middle" fill="#fbbf24" opacity=".9">
    PLAY · BLUFF · BRAWL · SURVIVE
  </text>
</svg>
