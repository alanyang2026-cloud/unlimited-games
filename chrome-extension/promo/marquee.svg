<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560">
  <defs>
    <!-- Background gradient — deep purple sweeping to magenta -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="titleStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="lift"><feGaussianBlur in="SourceAlpha" stdDeviation="5"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope=".5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Solid (no rounded corners) -->
  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#glow)"/>

  <!-- Decorative star sparkles -->
  <g fill="#fde047">
    <circle cx="80"   cy="80"  r="2"   opacity=".75"/>
    <circle cx="320"  cy="60"  r="2.5" opacity=".8"/>
    <circle cx="180"  cy="500" r="2"   opacity=".7"/>
    <circle cx="60"   cy="280" r="1.5" opacity=".6"/>
    <circle cx="1340" cy="100" r="2"   opacity=".8"/>
    <circle cx="1280" cy="490" r="2.5" opacity=".7"/>
    <circle cx="1370" cy="320" r="1.5" opacity=".6"/>
  </g>

  <!-- Left side: huge wordmark -->
  <g filter="url(#lift)">
    <text x="80" y="240" font-family="Impact, 'Arial Black', sans-serif"
          font-size="110" font-weight="900" letter-spacing="3"
          fill="url(#titleStroke)">UNLIMITED</text>
    <text x="80" y="340" font-family="Impact, 'Arial Black', sans-serif"
          font-size="110" font-weight="900" letter-spacing="3"
          fill="url(#title)">GAMES</text>
  </g>

  <!-- Yellow underline accent -->
  <rect x="80" y="362" width="320" height="5" fill="#fbbf24" opacity=".9"/>

  <!-- Tagline -->
  <text x="80" y="408" font-family="Georgia, serif" font-size="22"
        letter-spacing="2" fill="#fef3c7" opacity=".95">
    14 free browser games · Live multiplayer · No downloads
  </text>
  <text x="80" y="448" font-family="Georgia, serif" font-style="italic"
        font-size="17" letter-spacing="1" fill="#c4b5fd" opacity=".85">
    Snake · Chess · 3D Liar's Bar · Sword Fighter · Fishing · &amp; more
  </text>

  <!-- Right side: character lineup -->
  <!-- Pig (from Liar's Tavern) -->
  <g transform="translate(880 280)">
    <ellipse cx="0" cy="80" rx="80" ry="14" fill="#000" opacity=".35"/>
    <circle cx="0" cy="0" r="68" fill="#ffc8d6" stroke="#3b2410" stroke-width="3"/>
    <ellipse cx="0" cy="20" rx="32" ry="22" fill="#f78ca4" stroke="#3b2410" stroke-width="2"/>
    <circle cx="-9" cy="20" r="4" fill="#320a14"/>
    <circle cx="9"  cy="20" r="4" fill="#320a14"/>
    <circle cx="-22" cy="-14" r="7" fill="#0a0a0a"/>
    <circle cx="22"  cy="-14" r="7" fill="#0a0a0a"/>
    <circle cx="-20" cy="-16" r="2" fill="#fff"/>
    <circle cx="24"  cy="-16" r="2" fill="#fff"/>
    <polygon points="-40,-50 -55,-30 -25,-35" fill="#ffc8d6" stroke="#3b2410" stroke-width="2"/>
    <polygon points="40,-50 55,-30 25,-35"   fill="#ffc8d6" stroke="#3b2410" stroke-width="2"/>
  </g>

  <!-- Cow (from Liar's Tavern) -->
  <g transform="translate(1060 280)">
    <ellipse cx="0" cy="80" rx="80" ry="14" fill="#000" opacity=".35"/>
    <circle cx="0" cy="0" r="68" fill="#6b3a18" stroke="#1a0a04" stroke-width="3"/>
    <ellipse cx="0" cy="15" rx="35" ry="25" fill="#f5e6d0"/>
    <ellipse cx="0" cy="-10" rx="20" ry="35" fill="#f5e6d0" opacity=".95"/>
    <circle cx="-22" cy="-12" r="7" fill="#0a0a0a"/>
    <circle cx="22"  cy="-12" r="7" fill="#0a0a0a"/>
    <circle cx="-20" cy="-14" r="2" fill="#fff"/>
    <circle cx="24"  cy="-14" r="2" fill="#fff"/>
    <ellipse cx="-12" cy="22" rx="4" ry="3" fill="#1e0a0a"/>
    <ellipse cx="12"  cy="22" rx="4" ry="3" fill="#1e0a0a"/>
    <!-- Horns -->
    <ellipse cx="-50" cy="-46" rx="12" ry="32" fill="#e8d6b0" stroke="#1a0a04" stroke-width="2" transform="rotate(-30 -50 -46)"/>
    <ellipse cx="50"  cy="-46" rx="12" ry="32" fill="#e8d6b0" stroke="#1a0a04" stroke-width="2" transform="rotate(30 50 -46)"/>
    <!-- Ears (floppy) -->
    <ellipse cx="-65" cy="0" rx="14" ry="22" fill="#6b3a18" stroke="#1a0a04" stroke-width="2" transform="rotate(-40 -65 0)"/>
    <ellipse cx="65"  cy="0" rx="14" ry="22" fill="#6b3a18" stroke="#1a0a04" stroke-width="2" transform="rotate(40 65 0)"/>
  </g>

  <!-- Fox (from Liar's Tavern) -->
  <g transform="translate(1240 280)">
    <ellipse cx="0" cy="80" rx="80" ry="14" fill="#000" opacity=".35"/>
    <circle cx="0" cy="0" r="62" fill="#d0521a" stroke="#3b1208" stroke-width="3"/>
    <!-- Pointy snout -->
    <polygon points="-22,18 22,18 0,75" fill="#d0521a" stroke="#3b1208" stroke-width="3"/>
    <polygon points="-14,22 14,22 0,60"  fill="#f0a45c"/>
    <!-- Nose -->
    <ellipse cx="0" cy="68" rx="5" ry="4" fill="#0a0a0a"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-14" r="6" fill="#0a0a0a"/>
    <circle cx="18"  cy="-14" r="6" fill="#0a0a0a"/>
    <circle cx="-16" cy="-16" r="2" fill="#fff"/>
    <circle cx="20"  cy="-16" r="2" fill="#fff"/>
    <!-- Cheek mask -->
    <ellipse cx="-30" cy="10" rx="14" ry="10" fill="#f0a45c" opacity=".6"/>
    <ellipse cx="30"  cy="10" rx="14" ry="10" fill="#f0a45c" opacity=".6"/>
    <!-- Pointy ears -->
    <polygon points="-30,-60 -10,-30 -50,-30" fill="#d0521a" stroke="#3b1208" stroke-width="2"/>
    <polygon points="30,-60 10,-30 50,-30"     fill="#d0521a" stroke="#3b1208" stroke-width="2"/>
    <polygon points="-30,-55 -18,-32 -42,-32" fill="#6b2a08"/>
    <polygon points="30,-55 18,-32 42,-32"     fill="#6b2a08"/>
  </g>
</svg>
