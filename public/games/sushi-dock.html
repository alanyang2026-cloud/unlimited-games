<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sushi Dock</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;height:100%;overflow:hidden}
  body{display:flex;flex-direction:column;align-items:center;user-select:none}
  .topbar{width:100%;background:rgba(0,0,0,.35);padding:8px 12px;display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;font-size:14px;font-weight:600;border-bottom:1px solid #1e293b}
  .stat{background:#1e293b;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:6px;min-width:80px;justify-content:center}
  .stat .v{font-weight:800;font-size:15px}
  .gold{color:#fbbf24}
  .blue{color:#7dd3fc}
  .pink{color:#fb7185}
  .stage{position:relative;width:100%;max-width:900px;flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
  canvas{display:block;background:#0c4a6e;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:100%;height:auto;touch-action:manipulation;cursor:pointer}
  .actions{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:10px;pointer-events:none}
  .btn{pointer-events:auto;background:linear-gradient(180deg,#f59e0b,#d97706);border:none;color:#fff;font-weight:800;padding:12px 22px;border-radius:14px;font-size:16px;cursor:pointer;box-shadow:0 4px 0 #92400e,0 6px 12px rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s;letter-spacing:.5px}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #92400e,0 2px 6px rgba(0,0,0,.4)}
  .btn.green{background:linear-gradient(180deg,#22c55e,#15803d);box-shadow:0 4px 0 #14532d,0 6px 12px rgba(0,0,0,.4)}
  .btn.green:active{box-shadow:0 1px 0 #14532d,0 2px 6px rgba(0,0,0,.4)}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5)}
  .floater{position:absolute;font-weight:900;color:#fbbf24;text-shadow:0 2px 4px #000,0 0 8px rgba(251,191,36,.8);pointer-events:none;animation:floatUp 1.2s ease-out forwards;font-size:18px}
  @keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
  .shopBtn{position:absolute;top:10px;right:10px;background:#7c3aed;color:white;border:none;padding:8px 14px;border-radius:10px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #5b21b6;font-size:14px;z-index:10}
  .shopBtn:active{transform:translateY(2px);box-shadow:0 1px 0 #5b21b6}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:14px}
  .modal.show{display:flex}
  .modalInner{background:#1e293b;border-radius:14px;padding:18px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;border:2px solid #334155}
  .modalInner h2{margin:0 0 8px 0;color:#fbbf24;text-align:center;font-size:20px}
  .modalInner .sub{text-align:center;color:#94a3b8;font-size:12px;margin-bottom:14px}
  .upRow{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .upInfo{flex:1;min-width:0}
  .upName{font-weight:800;font-size:15px;color:#f1f5f9}
  .upDesc{font-size:11px;color:#94a3b8;margin-top:2px}
  .upLvl{font-size:11px;color:#7dd3fc;margin-top:2px}
  .upBuy{background:#fbbf24;color:#1e293b;border:none;padding:8px 12px;border-radius:8px;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap;min-width:80px}
  .upBuy:disabled{background:#475569;color:#94a3b8;cursor:not-allowed}
  .closeBtn{display:block;width:100%;margin-top:10px;padding:10px;background:#475569;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:15px}
  .biteAlert{position:absolute;background:#ef4444;color:white;padding:6px 14px;border-radius:20px;font-weight:900;font-size:14px;animation:pulse .4s ease-in-out infinite alternate;pointer-events:none;text-shadow:0 1px 2px #000}
  @keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.15)}}
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.95);color:#fbbf24;padding:10px 18px;border-radius:10px;font-weight:700;z-index:200;border:1px solid #334155;animation:toastFade 2.4s ease-out forwards;font-size:14px;text-align:center}
  @keyframes toastFade{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}10%,80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
  .legend{font-size:11px;color:#94a3b8;text-align:center;margin-top:4px}
</style>
</head>
<body>
  <div class="topbar">
    <div class="stat">💰 <span class="v gold" id="coins">0</span></div>
    <div class="stat">🐟 <span class="v blue" id="fish">0</span><span style="color:#64748b">/<span id="fishCap">8</span></span></div>
    <div class="stat">🍣 <span class="v pink" id="sushi">0</span><span style="color:#64748b">/<span id="sushiCap">4</span></span></div>
    <div class="stat">⭐ Day <span class="v" id="day">1</span></div>
  </div>

  <div class="stage">
    <canvas id="cv" width="900" height="520"></canvas>
    <button class="shopBtn" id="shopBtn">🛠 Upgrades</button>
    <div class="actions">
      <button class="btn" id="castBtn">🎣 Cast</button>
      <button class="btn green" id="cookBtn">🍣 Make Sushi</button>
    </div>
  </div>

  <div class="legend">Tap the dock to cast · Tap when fish bites · Buy upgrades to grow your shop</div>

  <div class="modal" id="shop">
    <div class="modalInner">
      <h2>🛠 Upgrade Shop</h2>
      <div class="sub">Spend coins to grow your sushi empire</div>
      <div id="upList"></div>
      <button class="closeBtn" id="closeShop">Close</button>
    </div>
  </div>

<script>
(function(){
'use strict';

// ── Canvas setup ─────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// ── Game state ───────────────────────────────────────────────
const SAVE_KEY = 'sushiDock.save.v1';
let state = {
  coins: 0,
  fish: [],      // array of {tier:1-4}
  sushi: [],     // array of {tier:1-4}
  day: 1,
  rod: 1,        // 1..5  affects bite window + rare chance + cap
  kitchen: 1,    // 1..5  affects sushi value multiplier
  restaurant: 1, // 1..5  affects seats + customer arrival speed + class
  dock: 1,       // 1..5  affects fish capacity + extra rare fish
};
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(s) Object.assign(state, s);
  }catch(e){}
}
function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
}
load();

// ── Upgrade definitions ──────────────────────────────────────
const UPGRADES = {
  rod: {
    name:"Fishing Rod", icon:"🎣",
    desc:l=>`Bite window +${(l*0.15).toFixed(2)}s · rare fish +${(l*8)}%`,
    cost:l=>Math.floor(20 * Math.pow(2.4, l-1)),
    max:5,
  },
  dock: {
    name:"Dock", icon:"⚓",
    desc:l=>`Fish storage: ${4+l*4}`,
    cost:l=>Math.floor(35 * Math.pow(2.5, l-1)),
    max:5,
  },
  kitchen: {
    name:"Kitchen", icon:"🔪",
    desc:l=>`Sushi value × ${(1 + l*0.6).toFixed(2)}`,
    cost:l=>Math.floor(60 * Math.pow(2.6, l-1)),
    max:5,
  },
  restaurant: {
    name:"Restaurant", icon:"🏠",
    desc:l=>`Seats ${l} · classier customers, faster arrivals`,
    cost:l=>Math.floor(80 * Math.pow(2.7, l-1)),
    max:5,
  },
};
function fishCap(){ return 4 + state.dock * 4; }
function sushiCap(){ return 2 + state.restaurant * 2; }
function biteWindowMs(){ return 600 + state.rod * 250; }   // 850..1850ms
function rareChance(){ return Math.min(0.7, 0.05 + state.rod * 0.08 + state.dock * 0.03); }
function sushiMult(){ return 1 + state.kitchen * 0.6; }
function customerInterval(){ return Math.max(2200, 7200 - state.restaurant * 950); }
function seatCount(){ return state.restaurant; }

// Base value of fish/sushi by tier
const FISH_VAL = [0, 5, 12, 28, 70];   // index = tier
const FISH_NAME = [null, "Sardine", "Mackerel", "Tuna", "Golden Trout"];
const FISH_COLOR = [null, "#94a3b8", "#60a5fa", "#fbbf24", "#f0abfc"];

// ── Customers ────────────────────────────────────────────────
const ANIMALS = [
  {name:"Cat", emoji:"🐱", patience:1.0, tip:1.0, minRest:1},
  {name:"Rabbit", emoji:"🐰", patience:0.9, tip:1.0, minRest:1},
  {name:"Bear", emoji:"🐻", patience:1.3, tip:1.2, minRest:1},
  {name:"Fox", emoji:"🦊", patience:0.85, tip:1.3, minRest:2},
  {name:"Panda", emoji:"🐼", patience:1.5, tip:1.5, minRest:2},
  {name:"Penguin", emoji:"🐧", patience:1.1, tip:1.4, minRest:2},
  {name:"Owl", emoji:"🦉", patience:1.2, tip:1.8, minRest:3},
  {name:"Tiger", emoji:"🐯", patience:0.8, tip:2.2, minRest:3},
  {name:"Dragon", emoji:"🐲", patience:1.0, tip:3.0, minRest:4},
];

let customers = [];      // active customers waiting on bench
let nextCustomerAt = 0;

// ── Fishing state ────────────────────────────────────────────
let mode = 'idle';       // idle | casting | waiting | bite | reeling | reward
let bobber = null;       // {x,y,t0}
let biteUntil = 0;       // ms when bite window ends
let castUntil = 0;       // ms when cast lands
let reelFishTier = 1;
let lastFrame = 0;

// Swimming background fish (visual)
const bgFish = [];
for(let i=0;i<14;i++){
  bgFish.push({
    x: Math.random()*W,
    y: 280 + Math.random()*220,
    vx: (Math.random()<0.5?-1:1) * (0.4 + Math.random()*0.8),
    size: 6 + Math.random()*8,
    color: ['#0369a1','#075985','#0c4a6e','#1e3a8a'][Math.floor(Math.random()*4)],
  });
}

// ── Scene geometry ───────────────────────────────────────────
const DOCK = { x:60, y:220, w:280, h:30 };
const DOG  = { x:170, y:170 };
const REST = { x:540, y:60, w:320, h:200 };  // restaurant building rect
const COUNTER = { x:540, y:240, w:320, h:30 };
const WATER_TOP = 250;

// ── Helpers ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function fmtCoins(n){ return n >= 1000 ? (n/1000).toFixed(1)+'k' : n; }
function updateHUD(){
  $('coins').textContent = fmtCoins(state.coins);
  $('fish').textContent = state.fish.length;
  $('fishCap').textContent = fishCap();
  $('sushi').textContent = state.sushi.length;
  $('sushiCap').textContent = sushiCap();
  $('day').textContent = state.day;
  $('cookBtn').disabled = state.fish.length === 0 || state.sushi.length >= sushiCap();
}

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

function floater(x, y, txt, color){
  const rect = cv.getBoundingClientRect();
  const sx = rect.left + (x / W) * rect.width;
  const sy = rect.top + (y / H) * rect.height;
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = txt;
  if(color) el.style.color = color;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1200);
}

// ── Drawing ──────────────────────────────────────────────────
function drawSky(){
  // gradient sky
  const g = ctx.createLinearGradient(0,0,0,WATER_TOP);
  g.addColorStop(0,'#fde68a');
  g.addColorStop(0.5,'#fbcfe8');
  g.addColorStop(1,'#bae6fd');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,WATER_TOP);
  // sun
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(120, 70, 26, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.arc(120, 70, 40, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // clouds
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  drawCloud(360, 50, 1);
  drawCloud(700, 90, 0.8);
  drawCloud(500, 30, 0.6);
}
function drawCloud(x,y,s){
  ctx.beginPath();
  ctx.arc(x, y, 16*s, 0, Math.PI*2);
  ctx.arc(x+16*s, y-4*s, 18*s, 0, Math.PI*2);
  ctx.arc(x+32*s, y, 14*s, 0, Math.PI*2);
  ctx.fill();
}
function drawWater(now){
  const g = ctx.createLinearGradient(0, WATER_TOP, 0, H);
  g.addColorStop(0,'#0ea5e9');
  g.addColorStop(1,'#082f49');
  ctx.fillStyle = g;
  ctx.fillRect(0, WATER_TOP, W, H-WATER_TOP);

  // ripples on surface
  ctx.strokeStyle = 'rgba(255,255,255,.25)';
  ctx.lineWidth = 1.5;
  for(let i=0;i<6;i++){
    const off = (now * 0.04 + i*120) % W;
    ctx.beginPath();
    ctx.moveTo(off, WATER_TOP + 4 + Math.sin(now*0.003 + i)*2);
    ctx.quadraticCurveTo(off+30, WATER_TOP - 2, off+60, WATER_TOP + 4);
    ctx.stroke();
  }

  // background swimming fish
  for(const f of bgFish){
    f.x += f.vx;
    if(f.x < -20) f.x = W + 20;
    if(f.x > W + 20) f.x = -20;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.ellipse(f.x, f.y, f.size, f.size*0.55, 0, 0, Math.PI*2);
    ctx.fill();
    // tail
    ctx.beginPath();
    const tx = f.vx > 0 ? -1 : 1;
    ctx.moveTo(f.x + tx*f.size, f.y);
    ctx.lineTo(f.x + tx*f.size*1.6, f.y - f.size*0.6);
    ctx.lineTo(f.x + tx*f.size*1.6, f.y + f.size*0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function drawDock(){
  // Pillars
  ctx.fillStyle = '#78350f';
  ctx.fillRect(DOCK.x + 20, DOCK.y + 20, 10, 60);
  ctx.fillRect(DOCK.x + DOCK.w - 30, DOCK.y + 20, 10, 60);
  // Planks
  ctx.fillStyle = state.dock >= 3 ? '#a16207' : '#78350f';
  ctx.fillRect(DOCK.x, DOCK.y, DOCK.w, DOCK.h);
  // plank lines
  ctx.strokeStyle = '#451a03';
  ctx.lineWidth = 1.5;
  for(let i=1;i<6;i++){
    ctx.beginPath();
    ctx.moveTo(DOCK.x + i*(DOCK.w/6), DOCK.y);
    ctx.lineTo(DOCK.x + i*(DOCK.w/6), DOCK.y + DOCK.h);
    ctx.stroke();
  }
  // broken plank if rough dock
  if(state.dock <= 1){
    ctx.fillStyle = '#0c4a6e';
    ctx.fillRect(DOCK.x + 60, DOCK.y + 6, 16, DOCK.h - 6);
  }
  // bait bucket
  ctx.fillStyle = '#dc2626';
  ctx.fillRect(DOCK.x + 220, DOCK.y - 18, 24, 18);
  ctx.strokeStyle = '#7f1d1d';
  ctx.strokeRect(DOCK.x + 220, DOCK.y - 18, 24, 18);
}

function drawDog(now){
  // Stick-figure dog (line art)
  const x = DOG.x, y = DOG.y;
  ctx.strokeStyle = '#fde68a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Body (oval-ish horizontal)
  ctx.beginPath();
  ctx.ellipse(x, y + 38, 26, 14, 0, 0, Math.PI*2);
  ctx.stroke();
  // Back legs
  ctx.beginPath();
  ctx.moveTo(x - 20, y + 50); ctx.lineTo(x - 22, y + 70);
  ctx.moveTo(x - 8, y + 50);  ctx.lineTo(x - 10, y + 70);
  ctx.stroke();
  // Front legs (one slightly forward)
  ctx.beginPath();
  ctx.moveTo(x + 18, y + 50); ctx.lineTo(x + 18, y + 70);
  ctx.moveTo(x + 6, y + 50);  ctx.lineTo(x + 6, y + 70);
  ctx.stroke();
  // Tail (wagging)
  const wag = Math.sin(now*0.008) * 0.3;
  ctx.beginPath();
  ctx.moveTo(x - 26, y + 36);
  ctx.quadraticCurveTo(x - 42, y + 24 + wag*10, x - 38, y + 14 + wag*16);
  ctx.stroke();
  // Head
  ctx.beginPath();
  ctx.ellipse(x + 28, y + 24, 14, 12, 0, 0, Math.PI*2);
  ctx.stroke();
  // Snout
  ctx.beginPath();
  ctx.moveTo(x + 38, y + 26);
  ctx.lineTo(x + 48, y + 30);
  ctx.lineTo(x + 38, y + 32);
  ctx.stroke();
  // Nose
  ctx.fillStyle = '#1e293b';
  ctx.beginPath(); ctx.arc(x + 48, y + 30, 2.5, 0, Math.PI*2); ctx.fill();
  // Ear
  ctx.beginPath();
  ctx.moveTo(x + 22, y + 14);
  ctx.lineTo(x + 18, y);
  ctx.lineTo(x + 30, y + 12);
  ctx.closePath();
  ctx.stroke();
  // Eye
  ctx.fillStyle = '#0f172a';
  ctx.beginPath(); ctx.arc(x + 34, y + 22, 1.8, 0, Math.PI*2); ctx.fill();

  // Fishing rod
  const rodColor = ['#94a3b8','#cbd5e1','#fcd34d','#22d3ee','#f0abfc'][Math.min(4, state.rod-1)];
  ctx.strokeStyle = rodColor;
  ctx.lineWidth = 2.5;
  const rodTip = { x: x + 95, y: y - 30 };
  ctx.beginPath();
  ctx.moveTo(x + 40, y + 20);
  ctx.quadraticCurveTo(x + 70, y - 10, rodTip.x, rodTip.y);
  ctx.stroke();

  // Fishing line + bobber
  if(mode === 'casting' || mode === 'waiting' || mode === 'bite' || mode === 'reeling'){
    let bx, by;
    if(mode === 'casting'){
      const t = Math.min(1, (performance.now() - bobber.t0) / 600);
      bx = rodTip.x + (bobber.x - rodTip.x) * t;
      by = rodTip.y + (bobber.y - rodTip.y) * t - Math.sin(t * Math.PI) * 60;
    } else if(mode === 'reeling'){
      const t = Math.min(1, (performance.now() - bobber.reelT0) / 400);
      bx = bobber.x + (rodTip.x - bobber.x) * t;
      by = bobber.y + (rodTip.y - bobber.y) * t;
    } else {
      bx = bobber.x;
      by = bobber.y + (mode==='bite' ? Math.sin(performance.now()*0.02)*4 : Math.sin(performance.now()*0.004)*2);
    }
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(rodTip.x, rodTip.y);
    ctx.lineTo(bx, by);
    ctx.stroke();
    // bobber
    ctx.fillStyle = mode === 'bite' ? '#ef4444' : '#f87171';
    ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(bx-4, by-1, 8, 2);

    // splash ring when bite
    if(mode === 'bite'){
      const t = (performance.now() % 600) / 600;
      ctx.strokeStyle = `rgba(239,68,68,${1-t})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(bx, by, 8 + t*20, 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

function drawRestaurant(){
  // Building
  ctx.fillStyle = state.restaurant >= 3 ? '#fef3c7' : '#d4d4d8';
  ctx.fillRect(REST.x, REST.y + 40, REST.w, REST.h);
  // Roof
  ctx.fillStyle = state.restaurant >= 4 ? '#dc2626' : '#7c2d12';
  ctx.beginPath();
  ctx.moveTo(REST.x - 14, REST.y + 50);
  ctx.lineTo(REST.x + REST.w/2, REST.y - 6);
  ctx.lineTo(REST.x + REST.w + 14, REST.y + 50);
  ctx.closePath();
  ctx.fill();
  // chimney
  ctx.fillStyle = '#475569';
  ctx.fillRect(REST.x + REST.w - 50, REST.y + 8, 14, 30);
  // smoke
  ctx.fillStyle = 'rgba(226,232,240,.6)';
  const t = performance.now() * 0.001;
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.arc(REST.x + REST.w - 43 + Math.sin(t+i)*3, REST.y - 4 - i*12, 6+i, 0, Math.PI*2);
    ctx.fill();
  }
  // Door
  ctx.fillStyle = '#7c2d12';
  ctx.fillRect(REST.x + REST.w/2 - 22, REST.y + 130, 44, 80);
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(REST.x + REST.w/2 + 14, REST.y + 170, 2.5, 0, Math.PI*2); ctx.fill();
  // Window
  ctx.fillStyle = '#0ea5e9';
  ctx.fillRect(REST.x + 30, REST.y + 70, 60, 50);
  ctx.fillRect(REST.x + REST.w - 90, REST.y + 70, 60, 50);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2;
  ctx.strokeRect(REST.x + 30, REST.y + 70, 60, 50);
  ctx.strokeRect(REST.x + REST.w - 90, REST.y + 70, 60, 50);
  ctx.beginPath();
  ctx.moveTo(REST.x + 60, REST.y + 70); ctx.lineTo(REST.x + 60, REST.y + 120);
  ctx.moveTo(REST.x + 30, REST.y + 95); ctx.lineTo(REST.x + 90, REST.y + 95);
  ctx.moveTo(REST.x + REST.w - 60, REST.y + 70); ctx.lineTo(REST.x + REST.w - 60, REST.y + 120);
  ctx.moveTo(REST.x + REST.w - 90, REST.y + 95); ctx.lineTo(REST.x + REST.w - 30, REST.y + 95);
  ctx.stroke();
  // Sign
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(REST.x + REST.w/2 - 60, REST.y + 20, 120, 22);
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('🍣 SUSHI', REST.x + REST.w/2, REST.y + 36);

  // Counter
  ctx.fillStyle = '#92400e';
  ctx.fillRect(COUNTER.x, COUNTER.y, COUNTER.w, COUNTER.h);
  ctx.strokeStyle = '#451a03';
  ctx.strokeRect(COUNTER.x, COUNTER.y, COUNTER.w, COUNTER.h);

  // Sushi tray on counter (show up to sushiCap slots)
  const cap = sushiCap();
  const slotW = Math.min(40, (COUNTER.w - 20) / cap);
  for(let i=0;i<cap;i++){
    const sx = COUNTER.x + 10 + i*slotW + slotW/2;
    const sy = COUNTER.y + 14;
    ctx.fillStyle = 'rgba(255,255,255,.15)';
    ctx.fillRect(sx - slotW/2 + 4, sy - 12, slotW - 8, 22);
    const piece = state.sushi[i];
    if(piece){
      // rice
      ctx.fillStyle = '#fef3c7';
      ctx.beginPath();
      ctx.ellipse(sx, sy + 2, 12, 6, 0, 0, Math.PI*2);
      ctx.fill();
      // fish on top
      ctx.fillStyle = FISH_COLOR[piece.tier];
      ctx.beginPath();
      ctx.ellipse(sx, sy - 4, 13, 4, 0, 0, Math.PI*2);
      ctx.fill();
      // nori wrap
      ctx.fillStyle = '#064e3b';
      ctx.fillRect(sx - 3, sy - 8, 6, 14);
    }
  }
}

function drawCustomers(){
  // bench in front of restaurant
  const benchY = REST.y + REST.h + 60;
  for(let i=0;i<customers.length;i++){
    const c = customers[i];
    const tx = REST.x + 30 + i * 64;
    // approach animation
    if(c.x === undefined){ c.x = W + 30; c.y = benchY; }
    const target = tx;
    c.x += (target - c.x) * 0.04;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y + 28, 18, 4, 0, 0, Math.PI*2);
    ctx.fill();
    // body
    ctx.font = '38px serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.animal.emoji, c.x, c.y + 20);

    // patience bar
    const patFrac = c.patienceLeft / c.patienceTotal;
    const bw = 40, bh = 5;
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(c.x - bw/2, c.y + 30, bw, bh);
    ctx.fillStyle = patFrac > 0.5 ? '#22c55e' : patFrac > 0.25 ? '#eab308' : '#ef4444';
    ctx.fillRect(c.x - bw/2, c.y + 30, bw * patFrac, bh);

    // order bubble
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(c.x - 24, c.y - 32, 48, 26, 8);
    ctx.fill();
    ctx.stroke();
    // little tail
    ctx.beginPath();
    ctx.moveTo(c.x - 4, c.y - 8);
    ctx.lineTo(c.x, c.y - 2);
    ctx.lineTo(c.x + 4, c.y - 8);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(c.x - 4, c.y - 8);
    ctx.lineTo(c.x, c.y - 2);
    ctx.lineTo(c.x + 4, c.y - 8);
    ctx.strokeStyle = '#1e293b';
    ctx.stroke();
    // order content
    ctx.fillStyle = FISH_COLOR[c.wantTier];
    ctx.beginPath();
    ctx.ellipse(c.x - 6, c.y - 17, 9, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fef3c7';
    ctx.beginPath();
    ctx.ellipse(c.x - 6, c.y - 13, 8, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 12px system-ui';
    ctx.fillText('×' + c.wantQty, c.x + 10, c.y - 12);
  }
}

function drawCastTrajectory(now){
  if(mode !== 'idle') return;
  // subtle hint: faint arc from rod tip showing cast area
  // (skip to keep things clean)
}

function drawTutorialArrow(now){
  if(state.coins > 0 || state.fish.length > 0 || state.sushi.length > 0) return;
  if(mode !== 'idle') return;
  // wiggly arrow pointing to dock
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center';
  const bob = Math.sin(now*0.005) * 4;
  ctx.fillText('👇 Tap CAST to fish!', 200, 290 + bob);
}

// polyfill roundRect for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
  };
}

// ── Game loop ────────────────────────────────────────────────
function loop(now){
  if(!lastFrame) lastFrame = now;
  const dt = Math.min(50, now - lastFrame);
  lastFrame = now;

  // Cast landing
  if(mode === 'casting' && now - bobber.t0 > 600){
    mode = 'waiting';
    // bite time depends on rod + random
    const minWait = 1200;
    const maxWait = Math.max(1800, 5000 - state.rod * 600);
    biteUntil = now + minWait + Math.random() * (maxWait - minWait);
  }
  // Bite trigger
  if(mode === 'waiting' && now > biteUntil){
    mode = 'bite';
    biteUntil = now + biteWindowMs();
    bobber.biteStart = now;
  }
  // Missed bite
  if(mode === 'bite' && now > biteUntil){
    mode = 'idle';
    bobber = null;
    toast('🐟 Got away!');
  }
  // Reeling complete
  if(mode === 'reeling' && now - bobber.reelT0 > 400){
    finishReel();
  }

  // Customers tick
  if(now > nextCustomerAt && customers.length < seatCount() && Math.random() < 0.6){
    spawnCustomer();
    nextCustomerAt = now + customerInterval();
  }
  for(let i=customers.length-1;i>=0;i--){
    const c = customers[i];
    c.patienceLeft -= dt;
    // Try to serve
    if(!c.served){
      // find a sushi of right tier
      const idx = state.sushi.findIndex(s => s.tier >= c.wantTier);
      if(idx >= 0 && c.qtyLeft > 0){
        const piece = state.sushi.splice(idx, 1)[0];
        c.qtyLeft--;
        const pay = Math.floor(FISH_VAL[piece.tier] * sushiMult() * c.animal.tip);
        state.coins += pay;
        floater(c.x || W-50, c.y || 300, '+'+pay, '#fbbf24');
        if(c.qtyLeft === 0){
          c.served = true;
          c.leaveT = now + 600;
        }
      }
    }
    if(c.served && now > c.leaveT){
      customers.splice(i, 1);
      continue;
    }
    if(c.patienceLeft <= 0 && !c.served){
      // leave angry
      floater(c.x || W-50, c.y || 300, '💢', '#ef4444');
      customers.splice(i, 1);
    }
  }

  // Draw
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawWater(now);
  drawDock();
  drawRestaurant();
  drawCustomers();
  drawDog(now);
  drawTutorialArrow(now);

  // Bite alert text
  if(mode === 'bite'){
    ctx.fillStyle = 'rgba(239,68,68,.95)';
    ctx.font = 'bold 22px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('!!! BITE — TAP TO REEL !!!', W/2, 80);
  }

  updateHUD();
  requestAnimationFrame(loop);
}

// ── Fishing actions ──────────────────────────────────────────
function startCast(){
  if(mode !== 'idle') return;
  if(state.fish.length >= fishCap()){
    toast('Dock full! Make sushi first.');
    return;
  }
  // bobber lands somewhere in water near dock
  const landX = 280 + Math.random() * 220;
  const landY = WATER_TOP + 30 + Math.random() * 40;
  bobber = { x: landX, y: landY, t0: performance.now() };
  mode = 'casting';
}

function tryReel(){
  if(mode === 'bite'){
    // determine fish tier
    let tier = 1;
    if(Math.random() < rareChance()) tier = 2;
    if(Math.random() < rareChance() * 0.5) tier = 3;
    if(Math.random() < rareChance() * 0.15) tier = 4;
    reelFishTier = tier;
    bobber.reelT0 = performance.now();
    mode = 'reeling';
  } else if(mode === 'waiting'){
    // too early: cancel
    mode = 'idle';
    bobber = null;
    toast('⏰ Too early!');
  }
}

function finishReel(){
  state.fish.push({tier: reelFishTier});
  floater(DOG.x + 100, DOG.y - 20, '+' + FISH_NAME[reelFishTier], FISH_COLOR[reelFishTier]);
  mode = 'idle';
  bobber = null;
  save();
}

function makeSushi(){
  if(state.fish.length === 0 || state.sushi.length >= sushiCap()) return;
  // take the highest-tier fish first (more value)
  state.fish.sort((a,b)=>b.tier-a.tier);
  const f = state.fish.shift();
  state.sushi.push({tier: f.tier});
  save();
}

// ── Customer spawn ───────────────────────────────────────────
function spawnCustomer(){
  // Available pool grows with restaurant level
  const pool = ANIMALS.filter(a => a.minRest <= state.restaurant + 1);
  const animal = pool[Math.floor(Math.random() * pool.length)];
  // Want tier scales with restaurant level (richer customers want fancier fish)
  let wantTier = 1;
  const r = Math.random();
  if(state.restaurant >= 2 && r < 0.35) wantTier = 2;
  if(state.restaurant >= 3 && r < 0.18) wantTier = 3;
  if(state.restaurant >= 4 && r < 0.10) wantTier = 4;
  const wantQty = 1 + (Math.random() < 0.3 ? 1 : 0) + (state.restaurant >= 3 && Math.random() < 0.25 ? 1 : 0);
  const basePatience = 18000;
  customers.push({
    animal,
    wantTier,
    wantQty,
    qtyLeft: wantQty,
    patienceTotal: basePatience * animal.patience,
    patienceLeft: basePatience * animal.patience,
    served: false,
  });
}

// ── Input ────────────────────────────────────────────────────
function canvasClick(e){
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);

  if(mode === 'bite' || mode === 'waiting'){
    tryReel();
    return;
  }
  // tap on water or dock → cast
  if(mode === 'idle' && (y > WATER_TOP - 30 || (x < 400 && y > 100))){
    startCast();
  }
}
cv.addEventListener('click', canvasClick);
cv.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  canvasClick({clientX:t.clientX, clientY:t.clientY});
}, {passive:false});

$('castBtn').addEventListener('click', ()=>{
  if(mode === 'bite' || mode === 'waiting') tryReel();
  else startCast();
});
$('cookBtn').addEventListener('click', makeSushi);

// ── Shop ─────────────────────────────────────────────────────
function renderShop(){
  const list = $('upList');
  list.innerHTML = '';
  for(const key in UPGRADES){
    const u = UPGRADES[key];
    const lvl = state[key];
    const maxed = lvl >= u.max;
    const cost = u.cost(lvl);
    const row = document.createElement('div');
    row.className = 'upRow';
    row.innerHTML = `
      <div style="font-size:26px">${u.icon}</div>
      <div class="upInfo">
        <div class="upName">${u.name} <span style="color:#7dd3fc">Lv ${lvl}${maxed?' (MAX)':''}</span></div>
        <div class="upDesc">${u.desc(lvl)}</div>
        <div class="upLvl">${maxed ? '' : 'Next: ' + u.desc(lvl + 1)}</div>
      </div>
      <button class="upBuy" data-k="${key}" ${maxed || state.coins < cost ? 'disabled' : ''}>
        ${maxed ? 'MAX' : '💰 ' + fmtCoins(cost)}
      </button>
    `;
    list.appendChild(row);
  }
  list.querySelectorAll('.upBuy').forEach(b => {
    b.addEventListener('click', ()=>{
      const k = b.dataset.k;
      const u = UPGRADES[k];
      const lvl = state[k];
      if(lvl >= u.max) return;
      const cost = u.cost(lvl);
      if(state.coins < cost) return;
      state.coins -= cost;
      state[k]++;
      save();
      renderShop();
      updateHUD();
      toast(`⬆ ${u.name} → Lv ${state[k]}`);
    });
  });
}
$('shopBtn').addEventListener('click', ()=>{
  renderShop();
  $('shop').classList.add('show');
});
$('closeShop').addEventListener('click', ()=>{
  $('shop').classList.remove('show');
});
$('shop').addEventListener('click', (e)=>{
  if(e.target === $('shop')) $('shop').classList.remove('show');
});

// Keyboard
window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    if(mode === 'bite' || mode === 'waiting') tryReel();
    else startCast();
  }
  if(e.code === 'KeyC') makeSushi();
  if(e.code === 'KeyU'){ renderShop(); $('shop').classList.add('show'); }
});

// Day counter (every 60s = 1 day, just flavor)
setInterval(()=>{
  state.day++;
  save();
}, 60000);

// Start
updateHUD();
requestAnimationFrame(loop);

})();
</script>
